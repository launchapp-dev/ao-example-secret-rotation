patterns:
  - name: aws-access-key
    regex: "AKIA[0-9A-Z]{16}"
    severity: critical
    type: aws-access-key

  - name: aws-secret-key
    regex: "[0-9a-zA-Z/+]{40}"
    context_regex: "aws_secret|AWS_SECRET"
    severity: critical
    type: aws-access-key

  - name: github-token
    regex: "ghp_[0-9a-zA-Z]{36}"
    severity: high
    type: api-key

  - name: github-fine-grained-token
    regex: "github_pat_[0-9a-zA-Z_]{82}"
    severity: high
    type: api-key

  - name: generic-api-key
    regex: "['\"]?[a-zA-Z_]*(?:api[_-]?key|apikey|api[_-]?secret)['\"]?\\s*[:=]\\s*['\"]([^'\"\\s]{16,})['\"]"
    severity: medium
    type: api-key

  - name: private-key-pem
    regex: "-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"
    severity: critical
    type: ssh-key

  - name: jwt-secret
    regex: "['\"]?(?:jwt[_-]?secret|JWT_SECRET)['\"]?\\s*[:=]\\s*['\"]([^'\"\\s]{16,})['\"]"
    severity: high
    type: jwt-secret

  - name: database-url-postgres
    regex: "postgres(?:ql)?://[^\\s'\"]{10,}"
    severity: critical
    type: database-url

  - name: database-url-mysql
    regex: "mysql://[^\\s'\"]{10,}"
    severity: critical
    type: database-url

  - name: database-url-mongodb
    regex: "mongodb(?:\\+srv)?://[^\\s'\"]{10,}"
    severity: critical
    type: database-url

  - name: slack-token
    regex: "xox[baprs]-[0-9a-zA-Z-]{10,}"
    severity: high
    type: api-key

  - name: stripe-key
    regex: "sk_(?:live|test)_[0-9a-zA-Z]{24,}"
    severity: critical
    type: api-key
